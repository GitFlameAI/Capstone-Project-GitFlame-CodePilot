name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Go build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go test ./...
      - run: go build -o /tmp/gitflame-backend ./cmd/server
      - run: go build -o /tmp/agent-worker ./cmd/agent-worker

  python:
    name: Python tests and ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recommendations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: recommendations/uv.lock
      - run: uv sync --dev
      - run: uv run pytest
      - run: uv run ruff check .

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker compose \
            -f docker-compose.yml \
            -f backend/deploy/docker-compose.sprint2.override.yml \
            config --quiet
