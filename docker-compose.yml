services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ML_SERVICE_URL: http://ml-service:8001
      DATABASE_URL: postgresql://gitflame:gitflame@database:5432/gitflame_codepilot
    depends_on:
      ml-service:
        condition: service_started
      database:
        condition: service_healthy

  ml-service:
    build:
      context: ./ml_service
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitflame
      POSTGRES_PASSWORD: gitflame
      POSTGRES_DB: gitflame_codepilot
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations/initial_schema.sql:/docker-entrypoint-initdb.d/initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitflame -d gitflame_codepilot"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

