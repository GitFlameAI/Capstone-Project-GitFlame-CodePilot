services:
  agent-engine:
    environment:
      RAG_BASE_URL: ${RAG_BASE_URL:-http://coderag:8004}
      RAG_API_KEY: ${RAG_API_KEY:-}
      MODEL_CONTEXT_LIMIT: ${MODEL_CONTEXT_LIMIT:-32768}
    depends_on:
      coderag:
        condition: service_healthy

  coderag:
    image: ${CODERAG_IMAGE:-gitflame-coderag:local}
    build:
      context: ${CODERAG_CONTEXT:-../GitFlame-CodeRAG}
      dockerfile: ${CODERAG_DOCKERFILE:-Dockerfile}
    ports:
      - "${CODERAG_PORT:-8004}:${CODERAG_INTERNAL_PORT:-8004}"
    environment:
      PORT: ${CODERAG_INTERNAL_PORT:-8004}
      RAG_API_KEY: ${RAG_API_KEY:-}
      RAG_MAX_CONTEXT_FILES: ${RAG_MAX_CONTEXT_FILES:-20}
      RAG_MAX_CHUNKS_PER_FILE: ${RAG_MAX_CHUNKS_PER_FILE:-3}
      RAG_MAX_CONTEXT_TOKENS: ${RAG_MAX_CONTEXT_TOKENS:-12000}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; port=os.getenv('PORT','8004'); urllib.request.urlopen(f'http://localhost:{port}/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
