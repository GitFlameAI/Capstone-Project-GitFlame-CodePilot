services:
  frontend:
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    environment:
      AGENT_ENGINE_URL: http://agent-engine:8001
      AGENT_ENGINE_TIMEOUT_SECONDS: "600"
      REDIS_URL: redis://redis:6379/0
      TASK_DISPATCH_MODE: redis
      AGENT_QUEUE_NAME: gitflame:agent:tasks
      AGENT_CONSUMER_GROUP: gitflame-agent-workers
      AGENT_QUEUE_MAX_LENGTH: "1000"
      GITFLAME_BASE_URL: ${GITFLAME_BASE_URL:-https://api.gitflametest.ru}
      GITFLAME_API_KEY: ${GITFLAME_API_KEY:-}
      GITFLAME_TIMEOUT_SECONDS: ${GITFLAME_TIMEOUT_SECONDS:-30}
      GITFLAME_CREDENTIAL_KEY: ${GITFLAME_CREDENTIAL_KEY:-12345678901234567890123456789012}
      GITFLAME_CREDENTIAL_KEY_VERSION: ${GITFLAME_CREDENTIAL_KEY_VERSION:-1}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-codepilot_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:7860
      RECOMMENDATION_SERVICE_TIMEOUT_SECONDS: ${RECOMMENDATION_SERVICE_TIMEOUT_SECONDS:-120}
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      agent-engine:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ml-service:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  recommendation-service:
    build:
      context: ./recommendations
    ports:
      - "${RECOMMENDATION_SERVICE_PORT:-8003}:7860"
    environment:
      AGENT_MODEL: ${AGENT_MODEL:-laguna}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:9000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_REQUEST_TIMEOUT_SECONDS: ${RECOMMENDATION_SERVICE_TIMEOUT_SECONDS:-120}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-2}
      MODEL_RETRY_BACKOFF_SECONDS: ${MODEL_RETRY_BACKOFF_SECONDS:-0.25}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/ready', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  agent-worker:
    build:
      context: ./backend
    command: ["/app/agent-worker"]
    environment:
      AGENT_ENGINE_URL: http://agent-engine:8001
      AGENT_ENGINE_TIMEOUT_SECONDS: "600"
      DATABASE_URL: postgresql://gitflame:gitflame@database:5432/gitflame_codepilot
      REDIS_URL: redis://redis:6379/0
      AGENT_QUEUE_NAME: gitflame:agent:tasks
      AGENT_CONSUMER_GROUP: gitflame-agent-workers
      AGENT_QUEUE_MAX_LENGTH: "1000"
      WORKER_MAX_RETRIES: "3"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      agent-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/agent-worker", "-healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 5

  agent-engine:
    build:
      context: .
      dockerfile: backend/deploy/agent-engine.Dockerfile
    command: ["gitflame-agent-engine"]
    ports:
      - "${AGENT_ENGINE_PORT:-8002}:8001"
    environment:
      AGENT_MODEL: ${AGENT_MODEL:-laguna}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:9000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_FALLBACK_MODEL: ${AGENT_FALLBACK_MODEL:-}
      FALLBACK_OPENAI_BASE_URL: ${FALLBACK_OPENAI_BASE_URL:-}
      FALLBACK_OPENAI_API_KEY: ${FALLBACK_OPENAI_API_KEY:-}
      AGENT_TIMEOUT_SECONDS: ${AGENT_TIMEOUT_SECONDS:-600}
      MODEL_REQUEST_TIMEOUT_SECONDS: ${MODEL_REQUEST_TIMEOUT_SECONDS:-180}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-2}
      MODEL_RETRY_BACKOFF_SECONDS: ${MODEL_RETRY_BACKOFF_SECONDS:-0.25}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-12}
      AGENT_MAX_TOOL_CALLS: ${AGENT_MAX_TOOL_CALLS:-20}
      MAX_TOOL_OUTPUT_CHARS: ${MAX_TOOL_OUTPUT_CHARS:-8192}
      MODEL_CONTEXT_LIMIT: ${MODEL_CONTEXT_LIMIT:-32768}
      MODEL_MAX_COMPLETION_TOKENS: ${MODEL_MAX_COMPLETION_TOKENS:-12000}
      PLAN_MAX_COMPLETION_TOKENS: ${PLAN_MAX_COMPLETION_TOKENS:-6000}
      CODE_MAX_COMPLETION_TOKENS: ${CODE_MAX_COMPLETION_TOKENS:-12000}
      AGENT_SYNTHESIS_RESERVED_STEPS: ${AGENT_SYNTHESIS_RESERVED_STEPS:-3}
      RAG_BASE_URL: ${RAG_BASE_URL:-}
      RAG_API_KEY: ${RAG_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  database:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitflame -d gitflame_codepilot"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

volumes:
  redis_data:
